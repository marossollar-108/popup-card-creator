<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App3</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><h1>Test App3 — Modules + DOM</h1></header>
    <main>
        <aside class="panel-left">
            <section class="source-section">
                <h2>Zdrojovy obrazok</h2>
                <div id="drop-zone" class="drop-zone">
                    <canvas id="source-canvas"></canvas>
                    <div id="drop-hint" class="drop-hint"><p>Drop zone</p></div>
                </div>
                <input type="file" id="file-input" accept="image/*" hidden>
            </section>
            <section class="controls-section">
                <select id="bg-method"><option value="auto">Auto</option></select>
                <label>T: <span id="threshold-val">30</span></label>
                <input type="range" id="threshold" min="1" max="100" value="30">
                <label>L: <span id="layers-val">5</span></label>
                <input type="range" id="layer-count" min="3" max="8" value="5">
                <label>E: <span id="erosion-val">8</span></label>
                <input type="range" id="erosion-strength" min="3" max="20" value="8">
                <div id="color-pickers" class="color-pickers"></div>
                <button id="btn-generate" class="btn btn-primary btn-full" disabled>Gen</button>
                <div id="progress-bar" hidden><div class="progress-bar-track"><div id="progress-fill" class="progress-bar-fill"></div></div><span id="progress-text"></span></div>
            </section>
        </aside>
        <section class="panel-right">
            <h2>3D</h2>
            <div id="viewer-container" class="viewer-container">
                <canvas id="three-canvas"></canvas>
                <div id="viewer-placeholder" class="viewer-placeholder"><p>PH</p></div>
            </div>
            <div class="viewer-controls">
                <label><span id="open-angle-val">90</span></label>
                <input type="range" id="open-angle" min="0" max="180" value="90">
                <button id="btn-animate" class="btn btn-small">A</button>
            </div>
        </section>
    </main>
    <footer><div id="layers-strip" class="layers-strip"></div></footer>
    <div id="btn-upload" hidden></div>
    <div id="btn-export" hidden></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        console.log('1: importing modules...');

        const { ImageProcessor } = await import('./js/image-processor.js');
        console.log('2: ImageProcessor OK');

        const { LayerGenerator } = await import('./js/layer-generator.js');
        console.log('3: LayerGenerator OK');

        const { SvgExporter } = await import('./js/svg-exporter.js');
        console.log('4: SvgExporter OK');

        console.log('5: creating instances...');
        const ip = new ImageProcessor();
        const lg = new LayerGenerator();
        const se = new SvgExporter();
        console.log('6: instances OK');

        console.log('7: getting DOM...');
        const sourceCanvas = document.getElementById('source-canvas');
        const threeCanvas = document.getElementById('three-canvas');
        console.log('8: canvas elements:', sourceCanvas, threeCanvas);

        document.title = 'Test App3 — ALL OK';
        console.log('9: ALL DONE');
    </script>
</body>
</html>
